<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Booking System</title>
    <style>
        :root { --primary: #3498db; --bg: #f4f7f6; --text: #2c3e50; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 650px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 25px; color: var(--primary); }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 25px; color: #34495e; }
        .form-group { margin-bottom: 18px; }
        label, .group-title { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        .group-title { margin-top: 0; color: var(--text); }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: var(--primary); outline: none; }
        
        /* Radio Button Styling */
        .radio-tile-group { display: flex; gap: 15px; margin-top: 5px; }
        .radio-label { display: flex; align-items: center; gap: 8px; background: #f8f9fa; border: 2px solid #ddd; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; justify-content: center; transition: all 0.2s; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .radio-label { border-color: var(--primary); background: #ebf5fb; color: var(--primary); }

        /* Schedule Layout Styles */
        .schedule-section { display: none; margin-top: 15px; }
        .schedule-section.active { display: block; }
        .table-responsive { max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; position: sticky; top: 0; font-weight: 600; }
        .time-slot-btn { display: block; width: 100%; padding: 6px; border: 1px solid #3498db; background: transparent; color: #3498db; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .time-slot-btn:hover { background: #3498db; color: white; }
        .time-slot-btn.selected { background: #2ecc71 !important; color: white !important; border-color: #2ecc71 !important; }

        button.submit-btn { width: 100%; padding: 14px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 25px; }
        button.submit-btn:hover { background: #27ae60; }
        button.submit-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .hidden { display: none; }
        .success-card { text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="formScreen">
        <h2>🧺 Reserve Your Laundry Slot</h2>
        <form id="bookingForm">
            
            <!-- Fixed accessibility headers by switching container headers to structural semantic tags -->
            <div class="form-group">
                <p class="group-title">Identify As</p>
                <div class="radio-tile-group">
                    <div>
                        <input type="radio" id="genderBro" name="gender" value="Bro" required>
                        <label for="genderBro" class="radio-label"> Juan/Bro</label>
                    </div>
                    <div>
                        <input type="radio" id="genderSis" name="gender" value="Sis">
                        <label for="genderSis" class="radio-label"> Maria/Sis</label>
                    </div>
                </div>
            </div>

            <!-- Labels properly connected with target for attributes -->
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" required placeholder="Juan Dela Cruz">
            </div>

            <div class="form-group">
                <label for="roomNo">Room Number</label>
                <input type="text" id="roomNo" required placeholder="Room 302">
            </div>

            <div class="form-group">
                <p class="group-title">Service Needed</p>
                <div class="radio-tile-group">
                    <div>
                        <input type="radio" id="rentWasher" name="rented" value="Washer" required onclick="toggleSchedules()">
                        <label for="rentWasher" class="radio-label">💧 Washer</label>
                    </div>
                    <div>
                        <input type="radio" id="rentDryer" name="rented" value="Dryer" onclick="toggleSchedules()">
                        <label for="rentDryer" class="radio-label">🔥 Dryer</label>
                    </div>
                    <div>
                        <input type="radio" id="rentBoth" name="rented" value="Both" onclick="toggleSchedules()">
                        <label for="rentBoth" class="radio-label">🔄 Both</label>
                    </div>
                </div>
            </div>

            <!-- Interactive 2-Week Schedules -->
            <div id="washerScheduleSection" class="schedule-section">
                <h3>📅 Select Washer Time Slot</h3>
                <div class="table-responsive">
                    <table id="washerTable">
                        <thead><tr><th>Date</th><th>Available Time Slots</th></tr></thead>
                        <tbody><!-- Generated dynamically via JavaScript --></tbody>
                    </table>
                </div>
            </div>

            <div id="dryerScheduleSection" class="schedule-section">
                <h3>📅 Select Dryer Time Slot</h3>
                <div class="table-responsive">
                    <table id="dryerTable">
                        <thead><tr><th>Date</th><th>Available Time Slots</th></tr></thead>
                        <tbody><!-- Generated dynamically via JavaScript --></tbody>
                    </table>
                </div>
            </div>

            <div class="form-group" style="margin-top:20px;">
                <label for="paidTo">Paid To (Attendant Name)</label>
                <input type="text" id="paidTo" required placeholder="Staff Maria">
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">Confirm Reservation 🚀</button>
        </form>
    </div>

    <!-- Success Output Screen -->
    <div id="successScreen" class="hidden success-card">
        <div style="font-size:48px; margin-bottom:15px;">✅</div>
        <h2>Booking Logged Successfully!</h2>
        <p>The layout data has successfully transmitted straight to your tracking Google Sheet.</p>
        <button onclick="window.location.reload()" style="background:#34495e; color:white; padding:10px 20px; border:none; border-radius:5px; margin-top:15px; cursor:pointer;">Book New Entry</button>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzr5ws3w3-MjEa59rRFW2DYuiw9NJhIWfjmFamiiXZFHI9msLm9QVWpUW7foRFSwJC9JQ/exec";
    
    let selectedWasherTime = "Not Selected / Not Rented";
    let selectedDryerTime = "Not Selected / Not Rented";

    const operatingHours = ["08:00 AM - 10:00 AM", "10:00 AM - 12:00 PM", "01:00 PM - 03:00 PM", "03:00 PM - 05:00 PM"];

    window.onload = function() {
        buildSchedule('washerTable', 'washerSlot');
        buildSchedule('dryerTable', 'dryerSlot');
    };

    function buildSchedule(tableId, classPrefix) {
        const tbody = document.getElementById(tableId).getElementsByTagName('tbody')[0];
        const today = new Date();
        
        for (let i = 0; i < 14; i++) {
            const currentDay = new Date();
            currentDay.setDate(today.getDate() + i);
            const dateString = currentDay.toLocaleDateString('en-US', { month: 'short', day: 'numeric', weekday: 'short' });
            
            let row = tbody.insertRow();
            let dateCell = row.insertCell(0);
            dateCell.innerHTML = `<strong>${dateString}</strong>`;
            
            let slotsCell = row.insertCell(1);
            operatingHours.forEach(hour => {
                let uniqueText = `${dateString} @ ${hour}`;
                slotsCell.innerHTML += `<button type="button" class="time-slot-btn ${classPrefix}" onclick="selectSlot(this, '${classPrefix}', '${uniqueText}')">${hour}</button><div style="margin-bottom:6px;"></div>`;
            });
        }
    }

    function selectSlot(buttonElement, classPrefix, fullDateTimeString) {
        document.querySelectorAll('.' + classPrefix).forEach(btn => btn.classList.remove('selected'));
        buttonElement.classList.add('selected');

        if(classPrefix === 'washerSlot') { selectedWasherTime = fullDateTimeString; }
        if(classPrefix === 'dryerSlot') { selectedDryerTime = fullDateTimeString; }
    }

    function toggleSchedules() {
        const choice = document.querySelector('input[name="rented"]:checked').value;
        
        document.getElementById('washerScheduleSection').classList.remove('active');
        document.getElementById('dryerScheduleSection').classList.remove('active');
        
        if (choice === 'Washer' || choice === 'Both') { document.getElementById('washerScheduleSection').classList.add('active'); }
        if (choice === 'Dryer' || choice === 'Both') { document.getElementById('dryerScheduleSection').classList.add('active'); }
    }

    document.getElementById('bookingForm').addEventListener('submit', function(e) {
e.preventDefault();const serviceChosen = document.querySelector('input[name="rented"]:checked').value;if((serviceChosen === 'Washer' || serviceChosen === 'Both') && selectedWasherTime.includes('Not Selected')) { alert('Please pick a date & time slot for your Washer!'); return; }if((serviceChosen === 'Dryer' || serviceChosen === 'Both') && selectedDryerTime.includes('Not Selected')) { alert('Please pick a date & time slot for your Dryer!'); return; }const btn = document.getElementById('submitBtn');btn.disabled = true;btn.innerText = "Transmitting to Sheets Tracker... ⏳";const formData = {gender: document.querySelector('input[name="gender"]:checked').value,name: document.getElementById('name').value,room_no: document.getElementById('roomNo').value,rented: serviceChosen,time_rented_dryer: serviceChosen === 'Washer' ? 'N/A' : selectedDryerTime,time_rented_washer: serviceChosen === 'Dryer' ? 'N/A' : selectedWasherTime,timestamp: new Date().toLocaleString(),paid_to: document.getElementById('paidTo').value};fetch(GOOGLE_SCRIPT_URL, {method: 'POST',mode: 'no-cors',headers: { 'Content-Type': 'application/json' },body: JSON.stringify(formData)}).then(() => {document.getElementById('formScreen').classList.add('hidden');document.getElementById('successScreen').classList.remove('hidden');}).catch(err => {alert("Something went wrong. Please check connection.");btn.disabled = false;btn.innerText = "Confirm Reservation 🚀";console.error(err);});});
</script>
</body>
</html>
